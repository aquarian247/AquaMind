name: Deploy to Test Environment

on:
  workflow_dispatch:
    inputs:
      backend_tag:
        description: 'Backend image tag to deploy'
        required: true
        default: 'main'
        type: string
      frontend_tag:
        description: 'Frontend image tag to deploy'
        required: true
        default: 'main'
        type: string
      run_migrations:
        description: 'Run Django migrations during deploy'
        required: true
        default: true
        type: boolean
      collect_static:
        description: 'Run collectstatic during deploy'
        required: true
        default: true
        type: boolean
      bootstrap_admin:
        description: 'Ensure an admin user exists after deploy'
        required: true
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    environment: test
    permissions:
      contents: read

    steps:
    - name: Deploy to test environment
      env:
        DEPLOY_PATH: /opt/bakkamind
        BACKEND_IMAGE: ghcr.io/aquarian247/aquamind/backend:${{ inputs.backend_tag }}
        FRONTEND_IMAGE: ghcr.io/aquarian247/aquamind-frontend/frontend:${{ inputs.frontend_tag }}
        GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        PUBLIC_HOST: ${{ vars.TEST_PUBLIC_HOST }}
        TEST_ADMIN_USERNAME: ${{ secrets.TEST_ADMIN_USERNAME }}
        TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
        TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
      run: |
        echo "🚀 Starting deployment to test environment..."
        set -euo pipefail
        cd "${DEPLOY_PATH}"

        : "${PUBLIC_HOST:?Missing TEST_PUBLIC_HOST repository variable}"

        echo "🔐 Logging into GHCR for image pulls..."
        echo "${GHCR_PULL_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

        export BAKKAMIND_BACKEND_IMAGE="${BACKEND_IMAGE}"
        export BAKKAMIND_FRONTEND_IMAGE="${FRONTEND_IMAGE}"

        echo "📥 Pulling latest application images..."
        docker compose pull web celery-worker frontend

        echo "⚙️ Ensuring data services are up..."
        docker compose up -d timescale-db redis

        if [ "${{ inputs.run_migrations }}" = "true" ]; then
          echo "🗄️ Running migrations..."
          docker compose run --rm web python manage.py migrate
        fi

        if [ "${{ inputs.collect_static }}" = "true" ]; then
          echo "🧹 Collecting static files..."
          docker compose run --rm web python manage.py collectstatic --noinput
        fi

        if [ "${{ inputs.bootstrap_admin }}" = "true" ]; then
          : "${TEST_ADMIN_USERNAME:?Missing TEST_ADMIN_USERNAME secret}"
          : "${TEST_ADMIN_EMAIL:?Missing TEST_ADMIN_EMAIL secret}"
          : "${TEST_ADMIN_PASSWORD:?Missing TEST_ADMIN_PASSWORD secret}"

          echo "👤 Ensuring admin user exists..."
          docker compose run --rm \
            -e DJANGO_SUPERUSER_USERNAME="${TEST_ADMIN_USERNAME}" \
            -e DJANGO_SUPERUSER_EMAIL="${TEST_ADMIN_EMAIL}" \
            -e DJANGO_SUPERUSER_PASSWORD="${TEST_ADMIN_PASSWORD}" \
            web python manage.py ensure_admin_user
        fi

        echo "🔄 Starting application services..."
        docker compose up -d web celery-worker frontend caddy

        echo "⏳ Waiting for services to start..."
        sleep 20

        echo "🩺 Running health checks..."
        docker compose ps
        curl -fsS -H "Host: ${PUBLIC_HOST}" http://127.0.0.1/ > /dev/null
        curl -fsS -H "Host: ${PUBLIC_HOST}" http://127.0.0.1/api/v1/infrastructure/geographies/ > /dev/null

    - name: Notify deployment status
      if: always()
      env:
        PUBLIC_HOST: ${{ vars.TEST_PUBLIC_HOST }}
      run: |
        PUBLIC_HOST_EFFECTIVE="${PUBLIC_HOST:-test-host-not-set}"
        if [ ${{ job.status }} == 'success' ]; then
          echo "🎉 Deployment to test environment successful!"
          echo "🌐 Frontend: https://${PUBLIC_HOST_EFFECTIVE}"
          echo "🔗 Backend API: https://${PUBLIC_HOST_EFFECTIVE}/api/"
        else
          echo "💥 Deployment to test environment failed!"
          echo "Check the logs above for details."
        fi
